function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setShown(true); io.disconnect(); } }, { threshold });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, shown];
}

function Stat({ label, to, suffix, decimals = 0 }) {
  const ref = useRef(null);
  const [n, setN] = useState(0);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        setShown(true);
        const start = performance.now(), dur = 1400;
        const tick = (now) => {
          const p = Math.min(1, (now - start)/dur);
          const eased = 1 - Math.pow(1 - p, 3);
          setN(to * eased);
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    }, { threshold: .4 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [to]);
  return (
    <div ref={ref} style={{ textAlign:'center', opacity: shown ? 1 : 0, transition:'opacity .5s' }}>
      <div style={{ fontSize:'1.8rem', fontWeight:900, color:'#fff', letterSpacing:'-1px', fontVariantNumeric:'tabular-nums' }}>{n.toFixed(decimals)}{suffix}</div>
      <div style={{ fontSize:'0.7rem', fontWeight:700, letterSpacing:1.5, textTransform:'uppercase', color:'var(--sc-muted)', marginTop:4 }}>{label}</div>
    </div>
  );
}

            </div>
          </div>
        );
      })}
    </div>
  );
}

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.72)', backdropFilter:'blur(6px)', zIndex:100, display:'flex', alignItems:'center', justifyContent:'center', padding:'1.5rem' }}>

    </div>
  );

function App() {

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
